name: Build Flutter APK

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Auto-generate Android files
        run: flutter create . --platforms=android --project-name chronos_ai

      - name: Fix Android SDK & AGP
        run: |
          sed -i 's/compileSdk = .*/compileSdk = 34/' android/app/build.gradle || true
          sed -i 's/compileSdkVersion .*/compileSdkVersion 34/' android/app/build.gradle || true

      - name: Build APK
        run: flutter build apk --release --android-skip-build-dependency-validation

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          
